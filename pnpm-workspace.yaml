allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  sharp: true
  unrs-resolver: true
  vue-demi: true
  workerd: true
catalogs:
  cloudflare:
    '@nuxthub/core': 0.10.7
    wrangler: 4.84.1
  css:
    tailwindcss: 4.2.4
  nuxt:
    '@nuxt/a11y': 1.0.0-alpha.1
    '@nuxt/ui': 4.6.1
    nuxt: 4.4.2
  test:
    '@nuxt/test-utils': 4.0.2
    '@vue/test-utils': 2.4.6
    happy-dom: 20.9.0
    vitest: 4.1.5
  vp:
    vite-plus: 0.1.19
  vize:
    '@vizejs/nuxt': 0.63.0
    oxlint: 1.61.0
    oxlint-plugin-vize: 0.63.0
    vite: 8.0.10
  vue:
    vue: 3.5.33
    vue-router: 5.0.6

overrides:
  vite: catalog:vize

peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    vite: '*'
