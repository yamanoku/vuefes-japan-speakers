    vite: 8.0.10
  vue:
    "@vue/runtime-vapor": 3.6.0-beta.10
    "@vue/server-renderer": 3.6.0-beta.10
    vue: 3.6.0-beta.10
  vuerend:
    "@vuerend/core": 0.2.0
    srvx: 0.11.14
  vize:
    "@vizejs/vite-plugin": 0.75.0
