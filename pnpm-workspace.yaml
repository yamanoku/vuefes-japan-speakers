allowBuilds:
  "@parcel/watcher": true
  esbuild: true
  sharp: true
  unrs-resolver: true
  vue-demi: true
  workerd: true

catalogs:
  css:
    "@tailwindcss/vite": 4.3.1
    tailwindcss: 4.3.1
  test:
    "@vue/test-utils": 2.4.11
    playwright: 1.61.0
    vitest: 4.1.9
  typescript:
    "@types/node": 24.13.2
    typescript: 6.0.3
  vite:
    vite: 8.0.16
  vue:
    "@vue/server-renderer": 3.5.38
    vue: 3.5.38
  vuerend:
    "@vuerend/core": 0.3.0
  vize:
    "@vizejs/vite-plugin": 0.212.0
    oxlint: 1.69.0
    oxlint-plugin-vize: 0.212.0
    vize: 0.212.0
  vp:
    vite: npm:@voidzero-dev/vite-plus-core@0.1.24
    vite-plus: 0.1.24
    vitest: npm:@voidzero-dev/vite-plus-test@0.1.24

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"

autoInstallPeers: false

minimumReleaseAgeExclude:
  - "@voidzero-dev/*"
  - vize
  - "@vizejs/*"
  - oxlint
  - oxlint-plugin-vize
  - "@vuerend/*"
