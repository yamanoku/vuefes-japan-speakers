allowBuilds:
  "@parcel/watcher": true
  esbuild: true
  sharp: true
  unrs-resolver: true
  vue-demi: true
  workerd: true

overrides:
  "@vue/server-renderer": 3.6.0-beta.10
  vue: 3.6.0-beta.10

catalogs:
