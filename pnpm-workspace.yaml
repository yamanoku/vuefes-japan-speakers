allowBuilds:
  "@parcel/watcher": true
  esbuild: true
  sharp: true
  unrs-resolver: true
  vue-demi: true
  workerd: true
catalogs:
  css:
    "@tailwindcss/vite": 4.2.4
    tailwindcss: 4.2.4
  test:
    "@vue/test-utils": 2.4.10
    playwright: 1.59.1
    vitest: 4.1.5
  typescript:
    "@types/node": 24.12.2
    typescript: 6.0.3
  vite:
    vite: 8.0.10
  vue:
    "@vue/server-renderer": 3.5.34
    vue: 3.5.34
  vuerend:
    "@vuerend/core": 0.2.0
  vize:
    "@vizejs/vite-plugin": 0.76.0
    oxlint: 1.63.0
    oxlint-plugin-vize: 0.76.0
    vize: 0.76.0
  vp:
    vite: npm:@voidzero-dev/vite-plus-core@0.1.20
    vite-plus: 0.1.20
    vitest: npm:@voidzero-dev/vite-plus-test@0.1.20
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
autoInstallPeers: false
