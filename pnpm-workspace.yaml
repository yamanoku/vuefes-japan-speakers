allowBuilds:
  "@parcel/watcher": true
  esbuild: true
  sharp: true
  unrs-resolver: true
  vue-demi: true
  workerd: true
catalogs:
  css:
    "@tailwindcss/vite": 4.2.4
    tailwindcss: 4.2.4
  test:
    "@vue/test-utils": 2.4.6
    playwright: 1.59.1
    vitest: 4.1.5
  typescript:
    "@types/node": 24.12.2
    typescript: 5.9.3
  vite:
    vite: 8.0.10
  vue:
    vue: 3.5.33
  vuerend:
    "@vuerend/core": 0.1.1-alpha.3
  vize:
    "@vizejs/vite-plugin": 0.65.0
    oxlint: 1.61.0
    oxlint-plugin-vize: 0.65.0
    vize: 0.65.0
  vp:
    vite: npm:@voidzero-dev/vite-plus-core@0.1.19
    vite-plus: 0.1.19
    vitest: npm:@voidzero-dev/vite-plus-test@0.1.19

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
