allowBuilds:
  "@parcel/watcher": true
  esbuild: true
  sharp: true
  unrs-resolver: true
  vue-demi: true
  workerd: true

catalogs:
  css:
    "@tailwindcss/vite": 4.3.1
    tailwindcss: 4.3.3
  test:
    "@vue/test-utils": 2.4.11
    playwright: 1.61.1
    vitest: 4.1.10
  typescript:
    "@types/node": 24.13.3
    typescript: 7.0.2
  vite:
    vite: 8.0.16
  vue:
    "@vue/server-renderer": 3.5.40
    vue: 3.5.40
  vuerend:
    "@vuerend/core": 1.0.0-rc.2
  musea:
    "@vizejs/vite-plugin-musea": 0.291.0
    axe-core: 4.12.1
    esbuild: 0.28.1
  vize:
    "@vizejs/vite-plugin": 0.291.0
    oxlint: 1.75.0
    oxlint-plugin-vize: 0.291.0
    vize: 0.291.0
  vp:
    vite: npm:@voidzero-dev/vite-plus-core@0.1.24
    vite-plus: 0.1.24
    vitest: npm:@voidzero-dev/vite-plus-test@0.1.24

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vue: ">=3.5.31"
    vitest: "*"

autoInstallPeers: false

minimumReleaseAgeExclude:
  - "@voidzero-dev/*"
  - vize
  - "@vizejs/*"
  - oxlint
  - oxlint-plugin-vize
  - "@vuerend/*"
