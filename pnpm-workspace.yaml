allowBuilds:
  "@parcel/watcher": true
  esbuild: true
  sharp: true
  unrs-resolver: true
  vue-demi: true
  workerd: true
catalogs:
  css:
    "@tailwindcss/vite": 4.3.0
    tailwindcss: 4.3.0
  test:
    "@vue/test-utils": 2.4.10
    playwright: 1.60.0
    vitest: 4.1.7
  typescript:
    "@types/node": 24.12.4
    typescript: 6.0.3
  vite:
    vite: 8.0.13
  vue:
    "@vue/server-renderer": 3.5.34
    vue: 3.5.34
  vuerend:
    "@vuerend/core": 0.2.1
  vize:
    "@vizejs/vite-plugin": 0.78.0
    oxlint: 1.64.0
    oxlint-plugin-vize: 0.78.0
    vize: 0.78.0
  vp:
    vite: npm:@voidzero-dev/vite-plus-core@0.1.21
    vite-plus: 0.1.21
    vitest: npm:@voidzero-dev/vite-plus-test@0.1.21
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
autoInstallPeers: false
