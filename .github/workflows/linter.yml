name: Vize Lint

on:
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'
      - 'server/**'
      - 'types/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'vitest.config.ts'
      - '.oxlintrc.json'
      - 'vize.config.json'
      - 'nuxt.config.ts'
      - 'tsconfig.json'
      - 'tsconfig.vize.json'
      - 'server/tsconfig.json'
      - '.github/workflows/linter.yml'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run lint
        run: pnpm lint
        env:
          CI: true
