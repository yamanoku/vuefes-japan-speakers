name: VP Format

on:
  pull_request:
    branches:
      - main
    paths:
      - "app/**"
      - "README.md"
      - "server/**"
      - "types/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "eslint.config.mjs"
      - "tsconfig.json"
      - ".github/workflows/format.yml"

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@be55d5df2da88a2387a2e6764871ca9e5387e187 # v1
        with:
          node-version: "24"
          cache: true
      - name: Install dependencies
        run: vp install
      - name: Run vp fmt
        run: vp fmt . --check
        env:
          CI: true
