name: Vite+ Test

on:
  pull_request:
    branches:
      - main
    paths:
      - "app/**"
      - "server/**"
      - "types/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "vize.config.ts"
      - "vite.config.ts"
      - "tsconfig.json"
      - "tsconfig.vize.json"
      - ".github/workflows/vitest.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1
        with:
          node-version: "24"
          cache: true
      - name: Install dependencies
        run: vp install
      - name: Install Playwright browsers
        run: vp exec playwright install --with-deps chromium
      - name: Run tests
        run: vp test run
        env:
          CI: true
