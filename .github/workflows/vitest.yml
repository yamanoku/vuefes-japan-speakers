name: Vite+ Test

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "musea/**"
      - "config/**"
      - "types/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "vize.config.ts"
      - "vite.config.ts"
      - "tsconfig.json"
      - "tsconfig.vize.json"
      - ".github/workflows/vitest.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@35171c92dd08b67d5a9d3f2a4327800e58396f2a # v1
        with:
          node-version: "24"
          cache: true
      - name: Install dependencies
        run: vp install
      - name: Install Playwright browsers
        run: vp exec playwright install --with-deps chromium
      - name: Run tests
        run: vp test run
        env:
          CI: true
